<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#020325">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Bubbles</title>
  <link rel="stylesheet" href="style.css">

  <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Split images across multiple screens using Are.na" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="offkilter" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <script defer src="serviceworker.js"></script>
	<script defer src="app.js"></script>
</head>
<body>
  <div class="app">

    <!-- ===================== VIEW: BUBBLE MODE ===================== -->
    <div class="view view--active" id="view-bubbles">
      <div class="header">
        <div class="header__gradient"></div>
        <h1 class="header__title" id="bubbles-title">Your Bubbles</h1>
        <button class="header__icon-btn" id="search-btn-bubbles" aria-label="Search">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="2"/>
            <path d="M15.5 15.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="mode-toggle" id="toggle-bubbles">
        <button class="mode-toggle__btn" data-mode="contact">Contact Mode</button>
        <button class="mode-toggle__btn mode-toggle__btn--active" data-mode="bubble">Bubble Mode</button>
      </div>

      <div class="bubble-chart" id="bubble-chart">
        <div class="bg-glow"></div>
        <!-- Bubbles and avatars injected by app.js -->
      </div>

      <nav class="bottom-nav">
        <button class="bottom-nav__btn bottom-nav__btn--active" aria-label="Bubbles">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="19" cy="17" r="5" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="8" cy="19" r="3.5" stroke="currentColor" stroke-width="1.8"/>
          </svg>
        </button>
        <button class="bottom-nav__btn" aria-label="Add" id="add-btn">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="1.8"/>
            <path d="M14 8V20M8 14H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="bottom-nav__btn" aria-label="Profile">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="10" r="5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M4 24c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </nav>
    </div>

    <!-- ===================== VIEW: CONTACT MODE ===================== -->
    <div class="view" id="view-contacts">
      <div class="header">
        <div class="header__gradient"></div>
        <h1 class="header__title">Your Contacts</h1>
        <button class="header__icon-btn" aria-label="Search">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="2"/>
            <path d="M15.5 15.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="mode-toggle" id="toggle-contacts">
        <button class="mode-toggle__btn mode-toggle__btn--active" data-mode="contact">Contact Mode</button>
        <button class="mode-toggle__btn" data-mode="bubble">Bubble Mode</button>
      </div>

      <div class="contacts-list" id="contacts-list">
        <!-- Contact cards injected by app.js -->
      </div>

      <nav class="bottom-nav">
        <button class="bottom-nav__btn" aria-label="Bubbles">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="19" cy="17" r="5" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="8" cy="19" r="3.5" stroke="currentColor" stroke-width="1.8"/>
          </svg>
        </button>
        <button class="bottom-nav__btn" aria-label="Add">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="1.8"/>
            <path d="M14 8V20M8 14H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="bottom-nav__btn bottom-nav__btn--active" aria-label="Profile">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="10" r="5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M4 24c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </nav>
    </div>

    <!-- ===================== VIEW: BUBBLE DETAIL ===================== -->
    <div class="view" id="view-detail">
      <div class="header">
        <div class="header__gradient"></div>
        <button class="header__back-btn" id="back-btn" aria-label="Back">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <h1 class="header__title header__title--detail" id="detail-title">Work Bubble</h1>
        <button class="header__icon-btn" aria-label="Search">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="2"/>
            <path d="M15.5 15.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="mode-toggle" id="toggle-detail">
        <button class="mode-toggle__btn" data-mode="contact">Contact Mode</button>
        <button class="mode-toggle__btn mode-toggle__btn--active" data-mode="bubble">Bubble Mode</button>
      </div>

      <div class="bubble-chart bubble-chart--detail" id="bubble-detail-chart">
        <div class="bg-glow"></div>
        <!-- Detail bubble injected by app.js -->
      </div>

      <nav class="bottom-nav">
        <button class="bottom-nav__btn bottom-nav__btn--active" aria-label="Bubbles">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="19" cy="17" r="5" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="8" cy="19" r="3.5" stroke="currentColor" stroke-width="1.8"/>
          </svg>
        </button>
        <button class="bottom-nav__btn" aria-label="Add">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="1.8"/>
            <path d="M14 8V20M8 14H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="bottom-nav__btn" aria-label="Profile">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="10" r="5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M4 24c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </nav>
    </div>

    <!-- ===================== VIEW: USER PROFILE ===================== -->
    <!-- Opened by tapping the profile icon in the bottom nav -->
    <div class="view" id="view-profile">
      <div class="header">
        <div class="header__gradient"></div>
        <!-- Pill-style back button -->
        <button class="header__back-pill" id="profile-back-btn" aria-label="Back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <h1 class="header__title header__title--detail" id="profile-title">My Profile</h1>
        <!-- Spacer keeps the title visually centred -->
        <div class="header__spacer"></div>
      </div>

      <!-- Scrollable content is injected here by app.js → renderUserProfile() -->
      <div class="profile-scroll" id="profile-content"></div>

      <nav class="bottom-nav">
        <button class="bottom-nav__btn" aria-label="Bubbles" data-nav="bubbles">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="19" cy="17" r="5" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="8"  cy="19" r="3.5" stroke="currentColor" stroke-width="1.8"/>
          </svg>
        </button>
        <button class="bottom-nav__btn" aria-label="Add">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="1.8"/>
            <path d="M14 8V20M8 14H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="bottom-nav__btn bottom-nav__btn--active" aria-label="Profile">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="10" r="5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M4 24c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </nav>
    </div>

    <!-- ===================== VIEW: CONTACT DETAIL ===================== -->
    <!-- Opened by tapping a contact card or an avatar inside a bubble -->
    <div class="view" id="view-contact-detail">
      <div class="header">
        <div class="header__gradient"></div>
        <button class="header__back-pill" id="contact-detail-back-btn" aria-label="Back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <h1 class="header__title header__title--detail" id="contact-detail-title">Contact</h1>
        <div class="header__spacer"></div>
      </div>

      <!-- Scrollable content is injected here by app.js → renderContactDetail() -->
      <div class="profile-scroll" id="contact-detail-content"></div>

      <nav class="bottom-nav">
        <button class="bottom-nav__btn" aria-label="Bubbles" data-nav="bubbles">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="19" cy="17" r="5" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="8"  cy="19" r="3.5" stroke="currentColor" stroke-width="1.8"/>
          </svg>
        </button>
        <button class="bottom-nav__btn" aria-label="Add">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="1.8"/>
            <path d="M14 8V20M8 14H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="bottom-nav__btn" aria-label="Profile" data-nav="profile">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="10" r="5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M4 24c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </nav>
    </div>

  </div><!-- end .app -->

</body>
</html>
